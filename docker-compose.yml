services:
  postgres:
    image: postgres:16-alpine
    container_name: realestate-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: realestate
      POSTGRES_PASSWORD: realestate123
      POSTGRES_DB: realestate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
